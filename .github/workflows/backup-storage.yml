name: Backup Storage

on:
  schedule:
    - cron: "0 9 * * 5"
  workflow_dispatch:

permissions:
  contents: read

jobs:
  backup-storage:
    runs-on: ubuntu-latest
    env:
      BACKUP_TIMEZONE: America/Monterrey
      STORAGE_RETENTION_DAYS: "90"
      DRIVE_ROOT_FOLDER: refadiaz-backups
      STORAGE_BUCKETS: products,brands,radiators,providers,car-models,vehicle-notes
      SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
      SUPABASE_SERVICE_ROLE_KEY: ${{ secrets.SUPABASE_SERVICE_ROLE_KEY }}
      GOOGLE_DRIVE_FOLDER_ID: ${{ secrets.GOOGLE_DRIVE_FOLDER_ID }}
      GOOGLE_OAUTH_CLIENT_ID: ${{ secrets.GOOGLE_OAUTH_CLIENT_ID }}
      GOOGLE_OAUTH_CLIENT_SECRET: ${{ secrets.GOOGLE_OAUTH_CLIENT_SECRET }}
      GOOGLE_OAUTH_REFRESH_TOKEN: ${{ secrets.GOOGLE_OAUTH_REFRESH_TOKEN }}
      SHARED_DRIVE_ID: ${{ secrets.SHARED_DRIVE_ID }}
      GOOGLE_SERVICE_ACCOUNT_JSON: ${{ secrets.GOOGLE_SERVICE_ACCOUNT_JSON }}
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: "20"
      - name: Run storage backup
        run: node supabase/scripts/backups/storage-backup.js
